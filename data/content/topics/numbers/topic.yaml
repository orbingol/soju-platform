sections:
- id: number_systems
  label: Native vs Sino-Korean numbers
  description: |
    <p>Korean has two number systems. Use the right one for counting, dates, money, and floors.</p>
    <p>Before a counter, native numbers often shorten: 하나→한, 둘→두, 셋→세, 넷→네, 스물→스무 (20).</p>
  entries: []

- id: native_numbers
  label: Native Korean (하나, 둘, 셋…)
  description: |
    <p>Used with counters for small counts (usually 1–99): people, hours, age, and items with native counters.</p>
