- id: how_many
  label: How many? (몇)
  description: |
    <p><strong>몇</strong> asks “how many?” Pair it with a <strong>counter</strong> and use <strong>native Korean</strong> numbers in the answer (e.g. 세 개, 다섯 명).</p>
    <p>Pattern: [noun] + 몇 + [counter] + 이에요/예요? · Answer: [native number] + [counter].</p>
  entries:
  - id: 2ff0fac4-67bd-4bfa-b731-56431b0e96bc
    local: true
    hangul: 몇
    romanization: myeot
    english: how many
    examples:
    - hangul: 몇 개 있어요?
      english: How many are there?
  - id: 8b26f1e4-4802-4ab8-9ec6-dca780d8bd03
    local: true
    hangul: 몇 개
    romanization: myeot gae
    english: how many (things / general items)
    examples:
    - hangul: 사과 몇 개예요?
      english: How many apples?
  - id: fd27e5cb-f5a7-4953-b2d2-a2fc6d49541b
    local: true
    hangul: 몇 명
    romanization: myeot myeong
    english: how many (people)
    examples:
    - hangul: 버스에 몇 명이에요?
      english: How many people are on the bus?
  - id: fc012b0c-fbf7-4db2-9c94-c5e3ea7f8853
    local: true
    hangul: 몇 병
    romanization: myeot byeong
    english: how many (bottles)
    examples:
    - hangul: 맥주 몇 병이에요?
      english: How many bottles of beer?
  - id: 8d26fed6-ecea-4d4b-adba-f90f2b2293e7
    local: true
    hangul: 몇 권
    romanization: myeot gwon
    english: how many (books)
    examples:
    - hangul: 공책 몇 권이에요?
      english: How many notebooks?
  - id: 496c5334-73c7-4233-95d7-e0a3978dc4fe
    local: true
    hangul: 몇 장
    romanization: myeot jang
    english: how many (pieces of paper)
    examples:
    - hangul: 해리 포터 표 몇 장이에요?
      english: How many tickets for Harry Potter?
  - id: af994da3-10cc-4e0c-b233-9bee5ef562ee
    local: true
    hangul: 몇 마리
    romanization: myeot ma-ri
    english: how many (animals)
    examples:
    - hangul: 고양이 몇 마리예요?
      english: How many cats?
  - id: 18e909fd-b1fc-4c02-9e07-b8fee8d6a760
    local: true
    hangul: 몇 송이
    romanization: myeot song-i
    english: how many (flowers)
    examples:
    - hangul: 꽃 몇 송이예요?
      english: How many flowers?

- id: which_floor
  label: Which floor?
  description: |
    <p>Building floors use <strong>Sino-Korean</strong> numbers + the counter <strong>층</strong> (floor/story).</p>
    <p>Ask with <strong>몇</strong> (how many): 몇 층이에요? · Answer: 삼 층이에요 (3rd floor).</p>
  entries:
  - id: f240293b-91e2-4934-b6c2-7a6c17560bf8
    local: true
    hangul: 몇 층이에요?
    romanization: myeot cheung-i-e-yo?
    english: Which floor is it? / What floor?
  - id: 100537c2-043c-4006-a575-173919aecdb2
    local: true
    hangul: 삼 층이에요.
    romanization: sam cheung-i-e-yo.
    english: It's the 3rd floor.

- id: phone_numbers
  label: Phone numbers
  description: |
    <p>Ask <strong>전화번호가 뭐예요?</strong> (What's your phone number?).</p>
    <p>Read phone numbers digit by digit in <strong>Sino-Korean</strong>. Zero is usually <strong>공</strong> (not 영).</p>
    <p>When dictating, the hyphen between groups is read <strong>에</strong> (<em>e</em>) — not “dash.”</p>
    <p>Example: 010-1234-5678 → 공일공-일이삼사-오육칠팔 (say <strong>에</strong> at each dash).</p>
  entries:
  - id: 06fdd0e4-f4df-45fd-8948-1c7510a5130d
    local: true
    hangul: 전화번호가 뭐예요?
    romanization: jeon-hwa-beon-ho-ga mwo-ye-yo?
    english: What's your phone number?
  - id: 03dc6348-4646-470c-ad5c-0ff1242e7e60
    local: true
    hangul: 공일공-일이삼사-오육칠팔
    romanization: gong-il-gong-il-i-sam-sa-o-yuk-chil-pal
    english: 010-1234-5678 (read aloud digit by digit; dashes = 에)

- id: how_much
  label: How much?
  description: |
    <p>Prices use <strong>Sino-Korean</strong> + <strong>원</strong> (won). <strong>얼마</strong> asks “how much?”</p>
  entries:
  - id: bbb55499-e233-4b65-b5e4-5203d847c3ef
    local: true
    hangul: 얼마예요?
    romanization: eol-ma-ye-yo?
    english: How much is it?
  - id: e1f59efc-9024-43a4-84c7-07c948b5f82c
    local: true
    hangul: 오천 원이에요.
    romanization: o-cheon won-i-e-yo.
    english: It's 5,000 won.

- id: calendar
  label: Calendar (month & year)
  description: |
    <p>Months and years use <strong>Sino-Korean</strong>: <strong>월</strong> (month), <strong>년</strong> (year).</p>
    <p>July 2026 → 이천이십육년 유월 (year + month). See the <em>Time</em> topic for all month names.</p>
  entries:
  - ref: 3e5550e5-972c-45dd-ba6c-6e16c28d180e
  - ref: f1ec263b-8ca6-4565-a274-89a547417af1
  - ref: 0bb478a7-f6e9-44ea-af27-7f438cdc7969
  - id: f9888ae6-bfee-4ca1-8373-89c640461469
    local: true
    hangul: 이천이십육년
    romanization: i-cheon-i-sip-yuk-nyeon
    english: the year 2026

- id: birthday
  label: When is your birthday?
  description: |
    <p>Ask with <strong>언제</strong> (when). The date uses Sino-Korean month + <strong>일</strong> (day).</p>
    <p>Example answer: 유월 십오일 (July 15).</p>
  entries:
  - ref: 563100a7-0a8d-464c-aaf3-986b3a48de2f
  - id: 35452e2a-572d-415b-be8f-412e02970517
    local: true
    hangul: 생일이 언제예요?
    romanization: saeng-il-i eon-je-ye-yo?
    english: When is your birthday?
  - id: 2c950d9f-54b0-4810-acc0-39ff80a97ecc
    local: true
    hangul: 유월 십오일이에요.
    romanization: yu-wol sip-o-il-i-e-yo.
    english: It's July 15th.
