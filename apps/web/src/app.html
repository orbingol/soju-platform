<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="%sveltekit.assets%/vendor/pico.min.css" />
    <script>
      (function () {
        try {
          var k = 'soju-web:theme';
          var r = localStorage.getItem(k);
          if (r === null) r = localStorage.getItem('kr-edu:theme');
          if (!r) return;
          var v = JSON.parse(r);
          if (v === 'light' || v === 'dark') document.documentElement.setAttribute('data-theme', v);
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
